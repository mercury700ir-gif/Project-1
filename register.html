<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ورود یا ثبت‌نام در سایت مهبد نادری برای دریافت به‌روزرسانی‌ها و مقالات." />
    <title>ورود / ثبت‌نام | مهبد نادری</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .auth-page { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
      .auth-card { width:100%; max-width:420px; background:var(--surface); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); backdrop-filter:blur(16px); overflow:hidden; }
      .auth-tabs { display:flex; border-bottom:1px solid var(--line); }
      .auth-tab { flex:1; padding:16px; border:none; background:transparent; font:inherit; font-size:1rem; font-weight:800; color:var(--muted); cursor:pointer; transition:color 180ms ease, box-shadow 180ms ease; }
      .auth-tab.active { color:var(--accent); box-shadow:inset 0 -3px 0 var(--accent); }
      .auth-body { padding:28px 32px 32px; }
      .auth-pane { display:none; }
      .auth-pane.active { display:block; }
      .auth-body .field { margin-bottom:14px; }
      .auth-body .field label { display:block; margin-bottom:5px; font-weight:800; font-size:0.88rem; color:var(--ink); }
      .auth-body .field input { width:100%; height:48px; padding:0 14px; border:1px solid var(--line); border-radius:8px; background:rgba(255,255,255,0.58); color:var(--ink); font:inherit; font-size:0.92rem; outline:none; transition:border-color 160ms ease, box-shadow 160ms ease; }
      .auth-body .field input:focus { border-color:rgba(36,80,122,0.42); box-shadow:0 0 0 4px rgba(36,80,122,0.08); }
      .auth-error { color:var(--accent-2); font-size:0.85rem; min-height:22px; text-align:center; margin-bottom:12px; }
      .auth-success { color:var(--accent-2); font-size:0.85rem; min-height:22px; text-align:center; margin-bottom:12px; }
      .auth-btn { width:100%; }
      .auth-footer { text-align:center; margin-top:18px; font-size:0.85rem; color:var(--muted); }
      .auth-footer a { color:var(--accent); font-weight:700; }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main-content">رفتن به محتوای اصلی</a>
    <header class="site-header" role="banner">
      <div class="site-shell nav">
        <a class="brand" href="index.html" aria-label="خانه">
          <img class="brand-logo" src="assets/logo.png" alt="لوگوی مهبد نادری" />
          <span class="brand-text">
            <span>مهبد نادری</span>
            <small>معمار رشد دیجیتال</small>
          </span>
        </a>
        <nav class="nav-links" aria-label="ناوبری اصلی">
          <a href="index.html">خانه</a>
          <a href="about.html">درباره من</a>
          <a href="blog.html">نوشته‌ها</a>
          <a href="contact.html">تماس با من</a>
        </nav>
        <button class="menu-toggle" type="button" aria-label="باز کردن منو" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </header>
    <div class="mobile-menu" aria-label="منوی موبایل">
      <button class="mobile-menu-close" aria-label="بستن منو">&times;</button>
      <nav>
        <a href="index.html">خانه</a>
        <a href="about.html">درباره من</a>
        <a href="blog.html">نوشته‌ها</a>
        <a href="contact.html">تماس با من</a>
      </nav>
    </div>

    <main id="main-content" role="main">
      <div class="auth-page">
        <div class="auth-card">
          <div class="auth-tabs">
            <button class="auth-tab active" data-auth="login">ورود</button>
            <button class="auth-tab" data-auth="register">ثبت‌نام</button>
          </div>
          <div class="auth-body">
            <!-- Login -->
            <div id="auth-login" class="auth-pane active">
              <form id="login-form">
                <div class="field">
                  <label for="login-email">ایمیل</label>
                  <input id="login-email" type="email" autocomplete="email" required placeholder="example@email.com" dir="ltr" />
                </div>
                <div class="field">
                  <label for="login-pass">رمز عبور</label>
                  <input id="login-pass" type="password" autocomplete="current-password" required />
                </div>
                <p id="login-error" class="auth-error"></p>
                <button type="submit" class="button primary auth-btn">ورود</button>
                <p style="text-align:center;margin-top:12px"><a href="reset-password.html" style="color:var(--accent);font-size:0.85rem;font-weight:700">فراموشی رمز عبور؟</a></p>
              </form>
            </div>
            <!-- Register -->
            <div id="auth-register" class="auth-pane">
              <form id="register-form">
                <div class="field">
                  <label for="reg-name">نام و نام خانوادگی</label>
                  <input id="reg-name" type="text" autocomplete="name" required placeholder="نام کامل" />
                </div>
                <div class="field">
                  <label for="reg-phone">شماره موبایل</label>
                  <input id="reg-phone" type="tel" autocomplete="tel" required placeholder="09121234567" dir="ltr" />
                </div>
                <div class="field">
                  <label for="reg-email">ایمیل (نام کاربری)</label>
                  <input id="reg-email" type="email" autocomplete="email" required placeholder="example@email.com" dir="ltr" />
                </div>
                <div class="field">
                  <label for="reg-pass">رمز عبور</label>
                  <input id="reg-pass" type="password" autocomplete="new-password" required minlength="6" placeholder="حداقل ۶ کاراکتر" />
                </div>
                <p id="reg-error" class="auth-error"></p>
                <p id="reg-success" class="auth-success"></p>
                <button type="submit" class="button primary auth-btn">ثبت‌نام</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer" role="contentinfo">
      <div class="site-shell footer-inner">
        <span>© سایت شخصی مهبد نادری | <a href="contact.html">تماس برای مشاوره</a></span>
        <a href="admin.html" class="admin-link" aria-label="ورود به پنل مدیریت" title="ورود به پنل مدیریت">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span>مدیریت</span>
        </a>
      </div>
    </footer>

    <script defer src="script.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
      // Check if already logged in
      if (localStorage.getItem("site_user")) {
        window.location.href = "index.html";
        return;
      }

      // Tab switching
      document.querySelectorAll(".auth-tab").forEach(function(tab) {
        tab.addEventListener("click", function() {
          document.querySelectorAll(".auth-tab").forEach(function(t) { t.classList.remove("active"); });
          this.classList.add("active");
          document.querySelectorAll(".auth-pane").forEach(function(p) { p.classList.remove("active"); });
          var target = document.getElementById("auth-" + this.getAttribute("data-auth"));
          if (target) target.classList.add("active");
        });
      });

      // Login
      document.getElementById("login-form").addEventListener("submit", function(e) {
        e.preventDefault();
        var email = document.getElementById("login-email").value.trim().toLowerCase();
        var pass = document.getElementById("login-pass").value;
        var err = document.getElementById("login-error");
        err.textContent = "";

        var users = JSON.parse(localStorage.getItem("site_users") || "[]");
        var user = users.find(function(u) { return u.email === email && u.password === pass; });
        if (user) {
          localStorage.setItem("site_user", JSON.stringify({ name: user.name, email: user.email, phone: user.phone }));
          window.location.href = "index.html";
        } else {
          err.textContent = "ایمیل یا رمز عبور اشتباه است.";
        }
      });

      // Register
      document.getElementById("register-form").addEventListener("submit", function(e) {
        e.preventDefault();
        var name = document.getElementById("reg-name").value.trim();
        var phone = document.getElementById("reg-phone").value.trim();
        var email = document.getElementById("reg-email").value.trim().toLowerCase();
        var pass = document.getElementById("reg-pass").value;
        var err = document.getElementById("reg-error");
        var suc = document.getElementById("reg-success");
        err.textContent = "";
        suc.textContent = "";

        if (!name || !phone || !email || !pass) { err.textContent = "لطفاً همه فیلدها را پر کنید."; return; }
        if (pass.length < 6) { err.textContent = "رمز عبور باید حداقل ۶ کاراکتر باشد."; return; }

        var users = JSON.parse(localStorage.getItem("site_users") || "[]");
        if (users.find(function(u) { return u.email === email; })) {
          err.textContent = "این ایمیل قبلاً ثبت‌نام شده است.";
          return;
        }

        var newUser = { name: name, phone: phone, email: email, password: pass, date: new Date().toISOString() };
        users.push(newUser);
        localStorage.setItem("site_users", JSON.stringify(users));

        // Auto login
        localStorage.setItem("site_user", JSON.stringify({ name: name, email: email, phone: phone }));
        suc.textContent = "ثبت‌نام با موفقیت انجام شد! در حال انتقال...";
        setTimeout(function() { window.location.href = "index.html"; }, 1200);
      });
    });
    </script>
  </body>
</html>
