<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="بازیابی رمز عبور حساب کاربری." />
    <title>بازیابی رمز عبور | مهبد نادری</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .auth-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
      .auth-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);backdrop-filter:blur(16px);overflow:hidden}
      .auth-header{padding:28px 32px 0;text-align:center}
      .auth-header h1{font-size:1.3rem;margin-bottom:6px}
      .auth-header p{color:var(--muted);font-size:0.88rem}
      .auth-body{padding:24px 32px 32px}
      .auth-body .field{margin-bottom:14px}
      .auth-body .field label{display:block;margin-bottom:5px;font-weight:800;font-size:0.88rem;color:var(--ink)}
      .auth-body .field input{width:100%;height:48px;padding:0 14px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,0.58);color:var(--ink);font:inherit;font-size:0.92rem;outline:none;transition:border-color 160ms ease,box-shadow 160ms ease}
      .auth-body .field input:focus{border-color:rgba(36,80,122,0.42);box-shadow:0 0 0 4px rgba(36,80,122,0.08)}
      .auth-error{color:var(--accent-2);font-size:0.85rem;min-height:22px;text-align:center;margin-bottom:12px}
      .auth-success{color:var(--accent-2);font-size:0.85rem;min-height:22px;text-align:center;margin-bottom:12px}
      .auth-btn{width:100%}
      .auth-footer{text-align:center;margin-top:18px;font-size:0.85rem;color:var(--muted)}
      .auth-footer a{color:var(--accent);font-weight:700}
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main-content">رفتن به محتوای اصلی</a>
    <header class="site-header" role="banner">
      <div class="site-shell nav">
        <a class="brand" href="index.html" aria-label="خانه">
          <img class="brand-logo" src="assets/logo.png" alt="لوگوی مهبد نادری" />
          <span class="brand-text"><span>مهبد نادری</span><small>معمار رشد دیجیتال</small></span>
        </a>
        <nav class="nav-links" aria-label="ناوبری اصلی">
          <a href="index.html">خانه</a>
          <a href="about.html">درباره من</a>
          <a href="blog.html">نوشته‌ها</a>
          <a href="contact.html">تماس با من</a>
          <a href="register.html" class="nav-auth-btn" id="nav-auth-link">ورود / عضویت</a>
        </nav>
        <button class="menu-toggle" type="button" aria-label="باز کردن منو" aria-expanded="false"><span></span><span></span><span></span></button>
      </div>
    </header>
    <div class="mobile-menu" aria-label="منوی موبایل">
      <button class="mobile-menu-close" aria-label="بستن منو">&times;</button>
      <nav><a href="index.html">خانه</a><a href="about.html">درباره من</a><a href="blog.html">نوشته‌ها</a><a href="contact.html">تماس با من</a></nav>
    </div>

    <main id="main-content" role="main">
      <div class="auth-page">
        <div class="auth-card">
          <div class="auth-header">
            <h1>بازیابی رمز عبور</h1>
            <p>ایمیل خود را وارد کنید تا لینک بازیابی ارسال شود</p>
          </div>
          <div class="auth-body">
            <!-- Step 1: Enter email -->
            <form id="reset-form-step1">
              <div class="field">
                <label for="reset-email">ایمیل</label>
                <input id="reset-email" type="email" autocomplete="email" required placeholder="example@email.com" dir="ltr" />
              </div>
              <p id="reset-error" class="auth-error"></p>
              <p id="reset-success" class="auth-success"></p>
              <button type="submit" class="button primary auth-btn">ارسال لینک بازیابی</button>
            </form>
            <!-- Step 2: Enter new password (shown after email verified) -->
            <form id="reset-form-step2" style="display:none">
              <div class="field">
                <label for="reset-new-pass">رمز عبور جدید</label>
                <input id="reset-new-pass" type="password" required minlength="6" placeholder="حداقل ۶ کاراکتر" />
              </div>
              <div class="field">
                <label for="reset-confirm-pass">تکرار رمز عبور</label>
                <input id="reset-confirm-pass" type="password" required minlength="6" placeholder="تکرار رمز عبور" />
              </div>
              <p id="reset-error2" class="auth-error"></p>
              <p id="reset-success2" class="auth-success"></p>
              <button type="submit" class="button primary auth-btn">ذخیره رمز جدید</button>
            </form>
            <div class="auth-footer">
              <a href="register.html">بازگشت به ورود</a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer" role="contentinfo">
      <div class="site-shell footer-inner">
        <span>© سایت شخصی مهبد نادری</span>
      </div>
    </footer>

    <script defer src="script.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
      var resetEmail = "";
      var step1 = document.getElementById("reset-form-step1");
      var step2 = document.getElementById("reset-form-step2");

      step1.addEventListener("submit", function(e) {
        e.preventDefault();
        var email = document.getElementById("reset-email").value.trim().toLowerCase();
        var err = document.getElementById("reset-error");
        var suc = document.getElementById("reset-success");
        err.textContent = ""; suc.textContent = "";

        var users = JSON.parse(localStorage.getItem("site_users") || "[]");
        var user = users.find(function(u) { return u.email === email; });
        if (!user) {
          err.textContent = "کاربری با این ایمیل یافت نشد.";
          return;
        }

        resetEmail = email;
        suc.textContent = "ایمیل تأیید شد! رمز جدید خود را وارد کنید.";
        setTimeout(function() {
          step1.style.display = "none";
          step2.style.display = "block";
        }, 1000);
      });

      step2.addEventListener("submit", function(e) {
        e.preventDefault();
        var newPass = document.getElementById("reset-new-pass").value;
        var confirmPass = document.getElementById("reset-confirm-pass").value;
        var err = document.getElementById("reset-error2");
        var suc = document.getElementById("reset-success2");
        err.textContent = ""; suc.textContent = "";

        if (newPass.length < 6) { err.textContent = "رمز باید حداقل ۶ کاراکتر باشد."; return; }
        if (newPass !== confirmPass) { err.textContent = "رمزها مطابقت ندارند."; return; }

        var users = JSON.parse(localStorage.getItem("site_users") || "[]");
        var user = users.find(function(u) { return u.email === resetEmail; });
        if (user) {
          user.password = newPass;
          localStorage.setItem("site_users", JSON.stringify(users));
          suc.textContent = "رمز عبور با موفقیت تغییر کرد! در حال انتقال...";
          setTimeout(function() { window.location.href = "register.html"; }, 1500);
        }
      });
    });
    </script>
  </body>
</html>
