<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fafc;
      --muted: #b8c4d6;
      --panel: rgba(12, 18, 32, 0.72);
      --panel-border: rgba(255, 255, 255, 0.18);
      --accent: #47d9ff;
      --accent-2: #ffcf5a;
      --accent-3: #f56aa6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(71, 217, 255, 0.24), transparent 28rem),
        radial-gradient(circle at 80% 10%, rgba(245, 106, 166, 0.22), transparent 26rem),
        radial-gradient(circle at 50% 90%, rgba(255, 207, 90, 0.16), transparent 24rem),
        #080c14;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -40%;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 52px 52px;
      transform: rotate(-8deg);
      animation: drift 18s linear infinite;
      mask-image: radial-gradient(circle, black, transparent 68%);
      pointer-events: none;
    }

    main {
      width: min(92vw, 720px);
      padding: 56px;
      position: relative;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(22px) saturate(140%);
      text-align: center;
    }

    main::before {
      content: "";
      position: absolute;
      inset: 0;
      padding: 1px;
      border-radius: inherit;
      background: linear-gradient(135deg, var(--accent), rgba(255, 255, 255, 0.06), var(--accent-3));
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .spark {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-2);
      box-shadow: 0 0 22px var(--accent-2);
    }

    h1 {
      margin: 0;
      font-size: clamp(3.6rem, 12vw, 7.5rem);
      line-height: 0.9;
      letter-spacing: 0;
    }

    h1 span {
      display: block;
      background: linear-gradient(90deg, #ffffff, var(--accent), var(--accent-2), #ffffff);
      background-size: 220% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shimmer 7s ease-in-out infinite;
    }

    p {
      max-width: 560px;
      margin: 24px auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.8vw, 1.2rem);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 34px;
    }

    a {
      min-width: 148px;
      padding: 13px 18px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: var(--ink);
      font-weight: 800;
      text-decoration: none;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    a:first-child {
      background: linear-gradient(135deg, var(--accent), #7cf7d4);
      color: #061018;
      border-color: transparent;
    }

    a:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.42);
      background-color: rgba(255, 255, 255, 0.08);
    }

    @keyframes shimmer {
      0%, 100% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
    }

    @keyframes drift {
      from {
        transform: rotate(-8deg) translate3d(0, 0, 0);
      }
      to {
        transform: rotate(-8deg) translate3d(52px, 52px, 0);
      }
    }

    @media (max-width: 560px) {
      main {
        padding: 38px 22px;
      }

      .actions {
        flex-direction: column;
      }

      a {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow"><span class="spark"></span> First light online</div>
    <h1>Hello <span>World</span></h1>
    <p>A tiny page with a little extra polish: animated color, crisp glass, and a calm midnight glow.</p>
    <div class="actions" aria-label="Page actions">
      <a href="#" onclick="event.preventDefault()">Start</a>
      <a href="#" onclick="event.preventDefault()">Explore</a>
    </div>
  </main>
</body>
</html>
